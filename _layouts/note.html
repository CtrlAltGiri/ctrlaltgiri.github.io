---
layout: default
---

<main class="site-shell article-shell">
  <a href="{{ '/' | relative_url }}" class="article-back">← Home</a>
  <article class="article">
    <header>
      <h1>{{ page.title | escape }}</h1>
      <time datetime="{{ page.date | date: "%Y-%m-%d" }}">{{ page.date | date: "%B %d, %Y" }}</time>
    </header>
    {{ content }}
  </article>
</main>
